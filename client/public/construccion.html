<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBERCORP | En Construcción</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: 'Raleway', sans-serif; }
        
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.4);
        }

        .logo {
            width: 250px;
            margin-bottom: 50px;
            opacity: 0.9;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .line {
            width: 60px;
            height: 1px;
            background: #B8A07E;
            margin: 20px 0 30px;
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            max-width: 600px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; letter-spacing: 0.2em; }
            .logo { width: 180px; }
            p { font-size: 1rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="/video-construccion.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>

    <div class="content">
        <img src="/img/logo-white-transparent.png" alt="IBERCORP" class="logo">
        
        <h1>En Construcción</h1>
        
        <div class="line"></div>
        
        <p>Estamos preparando una nueva experiencia inmobiliaria exclusiva para usted.<br>Volvemos muy pronto con nuestro catálogo renovado.</p>

        <div class="footer">
            © 2026 IBERCORP · GESTIÓN DE PROPIEDADES
        </div>
    </div>
</body>
</html>
